name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install runtime dependencies
        run: uv pip install --system fastapi uvicorn httpx sse-starlette pydantic pydantic-settings

      - name: Install ruff
        run: uv pip install --system ruff

      - name: Lint (ruff)
        run: ruff check .

      - name: Smoke-test imports
        run: python -c "from config import settings; from risk import RiskManager; print('config OK — recall_base_url:', settings.recall_base_url); print('risk OK — max_position_pct:', settings.max_position_pct); print('ALL IMPORTS PASS')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
