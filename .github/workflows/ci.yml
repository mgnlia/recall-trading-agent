name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: |
          uv pip install --system \
            "fastapi>=0.115" \
            "uvicorn>=0.30" \
            "httpx>=0.27" \
            "sse-starlette>=2.0" \
            "pydantic>=2.0" \
            "pydantic-settings>=2.0" \
            "ruff>=0.6"

      - name: Lint (ruff)
        run: ruff check .

      - name: Typecheck (imports)
        run: python -c "import config; import risk; import agent; print('All imports OK')"

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci || npm install

      - name: Typecheck
        run: npx tsc --noEmit
        continue-on-error: true

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
